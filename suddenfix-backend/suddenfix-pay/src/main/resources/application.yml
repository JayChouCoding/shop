server:
  port: 8083

spring:
  application:
    name: suddenfix-pay
  datasource:
    # 关键：指定驱动类为 ShardingSphereDriver
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    # 关键：URL 指向 classpath 下的纯分片配置文件
    url: jdbc:shardingsphere:classpath:sharding-config.yaml
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  rabbitmq:
    publisher-confirm-type: correlated
    publisher-returns: true
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    template:
      mandatory: true
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: true
        prefetch: 1
  data:
    redis:
      host: localhost
      port: 6379
      database: 2
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
  shardingsphere:
    mode:
      type: Standalone

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.suddenfix.pay.domain.pojo
  configuration:
    map-underscore-to-camel-case: true

thread:
  core-size: 10
  max-size: 50
  keep-alive: 60
  queue-capacity: 200

suddenfix:
  jwt:
    secret: SuddenFix-MicroService-Secret-Key-123456
    expiration: 604800000

alipay:
  gateway-url: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  app-id: 9021000162644934
  merchant-private-key: 
  alipay-public-key: 
  notify-url: http://localhost:8080/api/pay/alipay/notify
  return-url: http://localhost:8080/api/pay/success
