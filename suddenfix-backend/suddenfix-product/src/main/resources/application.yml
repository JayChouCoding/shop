server:
  port: 8084

spring:
  application:
    name: suddenfix-product
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  rabbitmq:
    publisher-confirm-type: correlated
    publisher-returns: true
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    template:
      mandatory: true
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: true
        prefetch: 1
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/suddenfix_product?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

# 统一线程池配置
thread:
  core-size: 10
  max-size: 50
  keep-alive: 60
  queue-capacity: 200

# 统一 JWT 配置
suddenfix:
  jwt:
    secret: SuddenFix-MicroService-Secret-Key-123456
    expiration: 604800000
