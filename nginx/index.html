<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUDDEN MALL - 全功能电商平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .page-enter-active, .page-leave-active { transition: opacity 0.3s; }
        .page-enter-from, .page-leave-to { opacity: 0; }
    </style>
</head>
<body class="bg-gray-100">
<div id="app">
    <nav class="sticky top-0 z-50 glass border-b border-gray-200" v-if="view !== 'login'">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-8">
                <h1 @click="view = 'home'" class="text-2xl font-black text-indigo-600 cursor-pointer">SUDDEN MALL</h1>
                <div class="hidden md:flex space-x-6 text-sm font-bold">
                    <a href="#" @click="view = 'home'" :class="view === 'home' ? 'text-indigo-600' : 'text-gray-500'">首页</a>
                    <a href="#" @click="view = 'orders'" :class="view === 'orders' ? 'text-indigo-600' : 'text-gray-500'">我的订单</a>
                    <a href="#" @click="view = 'address'" :class="view === 'address' ? 'text-indigo-600' : 'text-gray-500'">地址管理</a>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <el-button type="primary" circle @click="showAgent = true">🤖</el-button>
                <el-dropdown>
                    <el-avatar size="small" src="https://api.dicebear.com/7.x/miniavs/svg"></el-avatar>
                    <template #dropdown>
                        <el-dropdown-menu>
                            <el-dropdown-item @click="logout">退出登录</el-dropdown-item>
                        </el-dropdown-menu>
                    </template>
                </el-dropdown>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">

        <div v-if="view === 'login'" class="min-h-screen flex items-center justify-center">
            <el-card class="w-96 rounded-2xl shadow-xl">
                <h2 class="text-2xl font-bold text-center mb-6">{{ isReg ? '用户注册' : '欢迎登录' }}</h2>
                <el-form label-position="top">
                    <el-form-item label="用户名">
                        <el-input v-model="authForm.userName"></el-input>
                    </el-form-item>
                    <el-form-item label="密码">
                        <el-input v-model="authForm.password" type="password" show-password></el-input>
                    </el-form-item>
                    <div v-if="isReg">
                        <el-form-item label="手机号"><el-input v-model="authForm.phone"></el-input></el-form-item>
                        <el-form-item label="邮箱"><el-input v-model="authForm.email"></el-input></el-form-item>
                    </div>
                    <el-button type="primary" class="w-full mt-4" @click="handleAuth">{{ isReg ? '立即注册' : '登录' }}</el-button>
                    <p class="text-center text-sm mt-4 text-gray-500 cursor-pointer" @click="isReg = !isReg">
                        {{ isReg ? '已有账号？去登录' : '没有账号？去注册' }}
                    </p>
                </el-form>
            </el-card>
        </div>

        <div v-if="view === 'home'">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <el-card v-for="p in products" :key="p.id" class="rounded-xl overflow-hidden hover:shadow-lg transition-shadow" :body-style="{ padding: '0px' }">
                    <img :src="p.pic" class="w-full h-48 object-cover">
                    <div class="p-4">
                        <h4 class="font-bold truncate">{{ p.name }}</h4>
                        <div class="flex justify-between items-center mt-4">
                            <span class="text-xl font-bold text-red-500">￥{{ p.price / 100 }}</span>
                            <el-button type="danger" size="small" round @click="buyProduct(p)">购买</el-button>
                        </div>
                    </div>
                </el-card>
            </div>
        </div>

        <div v-if="view === 'address'">
            <div class="flex justify-between mb-4">
                <h3 class="text-xl font-bold">我的收货地址</h3>
                <el-button type="primary" @click="editAddress({})">新增地址</el-button>
            </div>
            <el-table :data="addresses" class="w-full rounded-xl">
                <el-table-column prop="receiverName" label="收货人"></el-table-column>
                <el-table-column prop="receiverPhone" label="联系电话"></el-table-column>
                <el-table-column prop="fullAddress" label="详细地址"></el-table-column>
                <el-table-column label="操作">
                    <template #default="scope">
                        <el-button link type="primary" @click="editAddress(scope.row)">编辑</el-button>
                    </template>
                </el-table-column>
            </el-table>
        </div>
    </div>

    <el-drawer v-model="showAgent" title="AI 购物助手" size="400px">
        <div class="flex flex-col h-full">
            <div class="flex-1 overflow-y-auto space-y-4 p-2">
                <div v-for="m in chatLogs" :class="m.role === 'user' ? 'text-right' : 'text-left'">
                        <span :class="m.role === 'user' ? 'bg-indigo-100' : 'bg-gray-100'" class="inline-block p-2 rounded-lg text-sm">
                            {{ m.content }}
                        </span>
                </div>
            </div>
            <div class="pt-4 flex space-x-2">
                <el-input v-model="agentInput" placeholder="问问 AI..." @keyup.enter="askAgent"></el-input>
                <el-button type="primary" @click="askAgent">发送</el-button>
            </div>
        </div>
    </el-drawer>
</div>

<script>
    const { createApp, ref, onMounted } = Vue;
    const api = axios.create({ baseURL: '/api' });

    // 请求拦截器：自动注入 JWT Token
    api.interceptors.request.use(config => {
        const token = localStorage.getItem('token');
        if (token) {
            // 必须改为 Authorization，并按照后端习惯加上 Bearer 前缀
            config.headers['Authorization'] = 'Bearer ' + token;
        }
        return config;
    });

    createApp({
        setup() {
            const view = ref('home');
            const isReg = ref(false);
            const showAgent = ref(false);
            const products = ref([]);
            const addresses = ref([]);
            const chatLogs = ref([{ role: 'bot', content: '您好！我是您的智能助手，有什么可以帮您？' }]);
            const agentInput = ref('');
            const authForm = ref({ username: '', password: '', phone: '', email: '' });

            // 1. 登录注册逻辑 [对接 UserAuthController]
            const handleAuth = async () => {
                const url = isReg.value ? '/user/register' : '/user/login';
                try {
                    const res = await api.post(url, authForm.value);
                    if (res.data.code === 200) {
                        if (!isReg.value) {
                            localStorage.setItem('token', res.data.data);
                            view.value = 'home';
                            initData();
                        } else {
                            ElementPlus.ElMessage.success('注册成功，请登录');
                            isReg.value = false;
                        }
                    }
                } catch (e) { ElementPlus.ElMessage.error('认证失败'); }
            };

            // 2. 获取商品列表 [对接 ProductController]
            const initData = async () => {
                try {
                    const res = await api.get('/product/list');
                    products.value = res.data.data;
                    const addrRes = await api.get('/user/address/list');
                    addresses.value = addrRes.data.data;
                } catch (e) { view.value = 'login'; }
            };

            // 3. 下单支付流程 [对接 OrderController & PayController]
            const buyProduct = async (p) => {
                try {
                    const address = addresses.value[0] || {};
                    await api.post(`/product/preheat/${p.id}`);
                    // 创建订单
                    const orderRes = await api.post('/order/buy', {
                        idempotentKey: crypto?.randomUUID?.() || `${Date.now()}`,
                        products: { [p.id]: [1, p.price] },
                        productNames: { [p.id]: p.name },
                        freight: 0,
                        discountAmount: 0,
                        receiverName: address.consignee || '演示用户',
                        receiverPhone: address.phone || '13800138000',
                        receiverAddress: [address.province, address.city, address.area, address.detailAddress].filter(Boolean).join(' ') || '演示地址',
                        payChannel: 1
                    });
                    const orderId = orderRes.data.data;
                    const payRes = await api.get(`/pay/createAlipayPage/${orderId}`, { responseType: 'text' });
                    const wrapper = document.createElement('div');
                    wrapper.innerHTML = payRes.data;
                    document.body.appendChild(wrapper);
                    wrapper.querySelector('form')?.submit();
                } catch (e) { ElementPlus.ElMessage.error('库存不足或下单失败'); }
            };

            // 4. AI 助手 [对接 AgentController]
            const askAgent = async () => {
                if (!agentInput.value) return;
                chatLogs.value.push({ role: 'user', content: agentInput.value });
                const res = await api.post('/agent/task', { query: agentInput.value });
                chatLogs.value.push({ role: 'bot', content: res.data.data });
                agentInput.value = '';
            };

            const logout = () => { localStorage.removeItem('token'); view.value = 'login'; };

            onMounted(() => { if(localStorage.getItem('token')) initData(); else view.value = 'login'; });

            return { view, isReg, authForm, products, addresses, showAgent, chatLogs, agentInput, handleAuth, buyProduct, askAgent, logout };
        }
    }).use(ElementPlus).mount('#app');
</script>
</body>
</html>
