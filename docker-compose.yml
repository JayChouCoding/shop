services:
  mysql:
    image: mysql:8.0.46
    container_name: suddenfix-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - suddenfix-mysql-data:/var/lib/mysql
      - ./suddenfix_bootstrap_fixed.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - suddenfix-net

  nacos:
    image: nacos/nacos-server:v2.2.3
    platform: linux/amd64
    container_name: suddenfix-nacos
    restart: unless-stopped
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      JVM_XMS: 256m
      JVM_XMX: 256m
      JVM_XMN: 128m
      NACOS_AUTH_ENABLE: "false"
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8848'"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - suddenfix-net

  redis-master:
    image: redis:7.2-alpine
    container_name: suddenfix-redis-master
    restart: unless-stopped
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --port
      - "6379"
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1000"
      - --protected-mode
      - "no"
    volumes:
      - suddenfix-redis-master-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - suddenfix-net

  redis-replica-1:
    image: redis:7.2-alpine
    container_name: suddenfix-redis-replica-1
    restart: unless-stopped
    command:
      - redis-server
      - --port
      - "6379"
      - --replicaof
      - redis-master
      - "6379"
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1000"
      - --protected-mode
      - "no"
    depends_on:
      redis-master:
        condition: service_healthy
    volumes:
      - suddenfix-redis-replica-1-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - suddenfix-net

  redis-replica-2:
    image: redis:7.2-alpine
    container_name: suddenfix-redis-replica-2
    restart: unless-stopped
    command:
      - redis-server
      - --port
      - "6379"
      - --replicaof
      - redis-master
      - "6379"
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1000"
      - --protected-mode
      - "no"
    depends_on:
      redis-master:
        condition: service_healthy
    volumes:
      - suddenfix-redis-replica-2-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - suddenfix-net

  redis-sentinel-1:
    image: redis:7.2-alpine
    container_name: suddenfix-redis-sentinel-1
    restart: unless-stopped
    ports:
      - "26379:26379"
    command:
      - /bin/sh
      - -c
      - |
        cat <<'EOF' >/tmp/sentinel.conf
        port 26379
        bind 0.0.0.0
        sentinel monitor suddenfix-master redis-master 6379 2
        sentinel down-after-milliseconds suddenfix-master 5000
        sentinel failover-timeout suddenfix-master 10000
        sentinel parallel-syncs suddenfix-master 1
        sentinel resolve-hostnames yes
        sentinel announce-hostnames yes
        logfile ""
        dir /tmp
        EOF
        exec redis-server /tmp/sentinel.conf --sentinel
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - suddenfix-net

  redis-sentinel-2:
    image: redis:7.2-alpine
    container_name: suddenfix-redis-sentinel-2
    restart: unless-stopped
    ports:
      - "26380:26379"
    command:
      - /bin/sh
      - -c
      - |
        cat <<'EOF' >/tmp/sentinel.conf
        port 26379
        bind 0.0.0.0
        sentinel monitor suddenfix-master redis-master 6379 2
        sentinel down-after-milliseconds suddenfix-master 5000
        sentinel failover-timeout suddenfix-master 10000
        sentinel parallel-syncs suddenfix-master 1
        sentinel resolve-hostnames yes
        sentinel announce-hostnames yes
        logfile ""
        dir /tmp
        EOF
        exec redis-server /tmp/sentinel.conf --sentinel
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - suddenfix-net

  redis-sentinel-3:
    image: redis:7.2-alpine
    container_name: suddenfix-redis-sentinel-3
    restart: unless-stopped
    ports:
      - "26381:26379"
    command:
      - /bin/sh
      - -c
      - |
        cat <<'EOF' >/tmp/sentinel.conf
        port 26379
        bind 0.0.0.0
        sentinel monitor suddenfix-master redis-master 6379 2
        sentinel down-after-milliseconds suddenfix-master 5000
        sentinel failover-timeout suddenfix-master 10000
        sentinel parallel-syncs suddenfix-master 1
        sentinel resolve-hostnames yes
        sentinel announce-hostnames yes
        logfile ""
        dir /tmp
        EOF
        exec redis-server /tmp/sentinel.conf --sentinel
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - suddenfix-net

  kafka:
    image: apache/kafka:4.1.2
    container_name: suddenfix-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_LISTENERS: CONTROLLER://:9091,HOST://:9092,DOCKER://:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,DOCKER://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,HOST:PLAINTEXT,DOCKER:PLAINTEXT
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9091
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

      KAFKA_LOG_DIRS: /var/lib/kafka/data

    volumes:
      - suddenfix-kafka-data:/var/lib/kafka/data

    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-cluster.sh cluster-id --bootstrap-server localhost:9092 >/dev/null 2>&1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - suddenfix-net

  rabbitmq:
    image: rabbitmq:4.2.5-management-alpine
    container_name: suddenfix-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      TZ: Asia/Shanghai
    volumes:
      - suddenfix-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - suddenfix-net

  nginx:
    image: nginx:1.30.0-alpine
    container_name: suddenfix-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./suddenfix-ui/dist:/usr/share/nginx/html:ro
    depends_on:
      nacos:
        condition: service_started
      kafka:
        condition: service_started
      rabbitmq:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - suddenfix-net

volumes:
  suddenfix-mysql-data:
  suddenfix-redis-master-data:
  suddenfix-redis-replica-1-data:
  suddenfix-redis-replica-2-data:
  suddenfix-kafka-data:
  suddenfix-rabbitmq-data:

networks:
  suddenfix-net:
    driver: bridge
